# Release: gate, build once, publish to PyPI via OIDC Trusted Publishing, cut a
# GitHub Release with git-cliff notes. Triggered by a v* tag.
#
# Prerequisites (one-time): a PyPI pending publisher (repo ggueret/koina,
# workflow release.yml, environment pypi) and a "pypi" GitHub environment.

name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Verify the tag matches the package version
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG="${TAG_REF#refs/tags/v}"
          PY_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG pyproject=$PY_VER"
          [ "$TAG" = "$PY_VER" ] || { echo "::error::tag v$TAG does not match pyproject version $PY_VER"; exit 1; }
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: uv build
      - run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: [build, ci-gate]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC -> PyPI Trusted Publishing (the only elevated scope)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  github-release:
    needs: [build, ci-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # git-cliff needs full history
          persist-credentials: false
      - uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.cliff.outputs.content }}
          REF: ${{ github.ref_name }}
        run: |
          PRE=""
          case "$REF" in *a* | *b* | *rc*) PRE="--prerelease" ;; esac
          gh release create "$REF" dist/* --notes "$NOTES" $PRE
