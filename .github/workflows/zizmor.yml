# zizmor - https://github.com/zizmorcore/zizmor
#
# Static analysis for GitHub Actions workflows: catches workflow injection,
# token leak patterns, and other supply-chain footguns the default linters miss.
# Drops into .github/workflows/zizmor.yml. Pinned to commit SHA.

name: zizmor workflow audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  schedule:
    - cron: "0 6 * * 1"

permissions: read-all

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: zizmor.sarif
